steps:
  # ── Run API Tests ──
  - id: "test-api"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        cd api
        pip install -e ".[dev]" --quiet
        pytest --tb=short -q --no-header
    waitFor: ["-"]

  # ── SSDLC: SAST (Static Application Security Testing) ──
  - id: "sast-bandit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install bandit --quiet
        echo "━━━ SAST: Bandit Security Scan ━━━"
        bandit -r api/app/ -ll -ii --skip B101 -f json -o /workspace/bandit-report.json || true
        bandit -r api/app/ -ll -ii --skip B101
    waitFor: ["-"]

  # ── SSDLC: SCA (Software Composition Analysis) ──
  - id: "sca-audit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install pip-audit --quiet
        echo "━━━ SCA: Dependency Vulnerability Scan ━━━"
        pip-audit --requirement api/requirements.txt --skip-editable --output /workspace/sca-report.json --format json || true
        pip-audit --requirement api/requirements.txt --skip-editable
    waitFor: ["-"]

  # ── SSDLC: Secrets Scan ──
  - id: "secrets-scan"
    name: "zricethezav/gitleaks:latest"
    entrypoint: gitleaks
    args:
      [
        "detect",
        "--source",
        ".",
        "--no-banner",
        "--report-path",
        "/workspace/gitleaks-report.json",
        "--report-format",
        "json",
      ]
    waitFor: ["-"]

  # ── Build API ──
  - id: "build-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:staging"
      - "./api"
    waitFor: ["test-api"]

  # ── Build Web ──
  - id: "build-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "web/Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:staging"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_STAGING_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_PROJECT_ID}.firebasestorage.app"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=563447386199"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=1:563447386199:web:58002f335c8d7cec021312"
      - "."
    waitFor: ["test-api"]

  # ── Push Images ──
  - id: "push-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api",
      ]
    waitFor: ["build-api"]

  - id: "push-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web",
      ]
    waitFor: ["build-web"]

  # ── Deploy API to Staging ──
  - id: "deploy-api-staging"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy gabi-api-staging \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --memory=1Gi --cpu=1 \
          --min-instances=0 --max-instances=2 \
          --port=8080 \
          --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:nghost-db \
          --allow-unauthenticated \
          --set-env-vars="^##^GABI_GCP_PROJECT_ID=${PROJECT_ID}##GABI_VERTEX_AI_LOCATION=${_REGION}##GABI_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}##GABI_CORS_ORIGINS=[\"https://gabi-staging.ness.com.br\",\"https://gabi-web-3yxil5gluq-rj.a.run.app\",\"http://localhost:3000\"]##GABI_ADMIN_EMAILS=[\"resper@ness.com.br\",\"resper@bekaa.eu\"]##GABI_AUTO_APPROVE_DOMAINS=[\"ness.com.br\",\"bekaa.eu\"]##GABI_LOG_LEVEL=DEBUG##PYTHONPATH=/app" \
          --set-secrets="GABI_DATABASE_URL=database-url:latest,GABI_FIREBASE_ADMIN_SERVICE_ACCOUNT=firebase-admin-private-key:latest"
    waitFor: ["push-api"]

  # ── Deploy Web to Staging ──
  - id: "deploy-web-staging"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "gabi-web-staging"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${SHORT_SHA}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=2"
      - "--port=3000"
    waitFor: ["push-web"]

substitutions:
  _REGION: southamerica-east1
  _REPO: gabi
  _STAGING_API_URL: https://gabi-api-staging-3yxil5gluq-rj.a.run.app
  _FIREBASE_API_KEY: "AIzaSyAUMsVa5PBniJzU3yB9_JB9kaMAJGPvayE"
  _FIREBASE_AUTH_DOMAIN: "nghost-gabi.firebaseapp.com"
  _FIREBASE_PROJECT_ID: "nghost-gabi"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
