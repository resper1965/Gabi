steps:
  # ── Run API Tests ──
  - id: "test-api"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        cd api
        pip install -e ".[dev]" --quiet || true
        pytest --tb=short -q --no-header --cov=app --cov-fail-under=70 --cov-report=term-missing --cov-report=json:/workspace/coverage-report.json || true
    waitFor: ["-"]

  # ── SSDLC: SAST (Static Application Security Testing) ──
  - id: "sast-bandit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install bandit --quiet
        echo "━━━ SAST: Bandit Security Scan ━━━"
        bandit -r api/app/ -ll -ii --skip B101 -f json -o /workspace/bandit-report.json || true
        bandit -r api/app/ -ll -ii --skip B101 || true
    waitFor: ["-"]

  # ── SSDLC: SCA (Software Composition Analysis) ──
  - id: "sca-audit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install pip-audit --quiet
        echo "━━━ SCA: Dependency Vulnerability Scan ━━━"
        pip-audit --requirement api/requirements.txt --skip-editable --output /workspace/sca-report.json --format json || true
        pip-audit --requirement api/requirements.txt --skip-editable || true
    waitFor: ["-"]

  # ── SSDLC: Secrets Scan ──
  - id: "secrets-scan"
    name: "zricethezav/gitleaks:latest"
    entrypoint: gitleaks
    args:
      [
        "detect",
        "--source",
        ".",
        "--no-banner",
        "--report-path",
        "/workspace/gitleaks-report.json",
        "--report-format",
        "json",
        "--exit-code",
        "0",
      ]
    waitFor: ["-"]

  # ── SSDLC: IaC Security (Checkov) ──
  - id: "iac-checkov"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install checkov --quiet
        echo "━━━ IaC: Checkov Security Scan ━━━"
        checkov -d . --framework dockerfile --compact --quiet -o json > /workspace/checkov-report.json || true
        checkov -d . --framework dockerfile --compact --quiet || true
    waitFor: ["-"]

  # ── SSDLC: SAST — Semgrep (Multi-language) ──
  - id: "sast-semgrep"
    name: "returntocorp/semgrep:latest"
    entrypoint: semgrep
    args:
      [
        "scan",
        "--config",
        "auto",
        "--json",
        "--output",
        "/workspace/semgrep-report.json",
        "--severity",
        "WARNING",
        "api/app/",
      ]
    waitFor: ["-"]

  # ── SSDLC: Code Quality — Ruff (Linter + Formatter) ──
  - id: "lint-ruff"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install ruff --quiet
        echo "━━━ Code Quality: Ruff Lint ━━━"
        ruff check api/app/ --output-format=json > /workspace/ruff-report.json || true
        ruff check api/app/ --statistics || true
    waitFor: ["-"]

  # ── SSDLC: SBOM (Software Bill of Materials — ISO 27001 A.8.9) ──
  - id: "sbom-generate"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install cyclonedx-bom --quiet
        cd api
        pip install -e ".[dev]" --quiet 2>/dev/null || true
        cyclonedx-py environment -o /workspace/sbom.json --output-format json || true
        echo "━━━ SBOM generated ━━━"
    waitFor: ["-"]

  # ── Build API ──
  - id: "build-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:staging"
      - "./api"
    waitFor: ["-"]

  # ── Build Web ──
  - id: "build-web"
    name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    secretEnv: ["FIREBASE_API_KEY"]
    args:
      - "-c"
      - |
        docker build -f web/Dockerfile \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${_TAG} \
          -t ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:staging \
          --build-arg NEXT_PUBLIC_API_URL=${_STAGING_API_URL} \
          --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=$$FIREBASE_API_KEY \
          --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN} \
          --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID} \
          --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_PROJECT_ID}.firebasestorage.app \
          --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=563447386199 \
          --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=1:563447386199:web:58002f335c8d7cec021312 \
          .
    waitFor: ["test-api"]

  # ── SSDLC: Container Vulnerability Scan (Trivy) ──
  - id: "trivy-api"
    name: "aquasec/trivy:latest"
    args:
      [
        "image",
        "--severity",
        "HIGH,CRITICAL",
        "--format",
        "json",
        "--output",
        "/workspace/trivy-api-report.json",
        "--exit-code",
        "0",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${_TAG}",
      ]
    waitFor: ["build-api"]

  - id: "trivy-web"
    name: "aquasec/trivy:latest"
    args:
      [
        "image",
        "--severity",
        "HIGH,CRITICAL",
        "--format",
        "json",
        "--output",
        "/workspace/trivy-web-report.json",
        "--exit-code",
        "0",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${_TAG}",
      ]
    waitFor: ["build-web"]

  # ── Push Images ──
  - id: "push-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api",
      ]
    waitFor: ["build-api"]

  - id: "push-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web",
      ]
    waitFor: ["build-web"]

  # ── Deploy API to Staging ──
  - id: "deploy-api-staging"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy gabi-api \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --memory=1Gi --cpu=1 \
          --min-instances=0 --max-instances=2 \
          --port=8080 \
          --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:nghost-db \
          --allow-unauthenticated \
          --set-env-vars="^##^GABI_GCP_PROJECT_ID=${PROJECT_ID}##GABI_VERTEX_AI_LOCATION=${_REGION}##GABI_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}##GABI_CORS_ORIGINS=[\"https://gabi.ness.com.br\",\"https://gabi-staging.ness.com.br\",\"https://gabi-web-fbbwlzhdlq-rj.a.run.app\",\"http://localhost:3000\"]##GABI_ADMIN_EMAILS=[\"resper@ness.com.br\",\"resper@bekaa.eu\"]##GABI_AUTO_APPROVE_DOMAINS=[\"ness.com.br\",\"bekaa.eu\"]##GABI_LOG_LEVEL=DEBUG##GABI_ENABLE_DOCS=true##PYTHONPATH=/app" \
          --set-secrets="GABI_DATABASE_URL=database-url:latest,GABI_FIREBASE_ADMIN_SERVICE_ACCOUNT=firebase-admin-private-key:latest"
    waitFor: ["push-api"]

  # ── Deploy Web to Staging ──
  - id: "deploy-web-staging"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "gabi-web"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=0"
      - "--max-instances=2"
      - "--port=3000"
    waitFor: ["push-web"]

  # ── SSDLC: DAST — OWASP ZAP Baseline (Staging only) ──
  - id: "dast-zap"
    name: "ghcr.io/zaproxy/zaproxy:stable"
    entrypoint: bash
    args:
      - "-c"
      - |
        echo "━━━ DAST: OWASP ZAP Baseline Scan ━━━"
        echo "Waiting 30s for staging deploy to stabilize..."
        sleep 30
        zap-baseline.py \
          -t ${_STAGING_API_URL}/health \
          -J /zap/wrk/zap-report.json \
          -I || true
        cp /zap/wrk/zap-report.json /workspace/zap-report.json 2>/dev/null || true
        echo "━━━ ZAP scan complete ━━━"
    volumes:
      - name: "zap-wrk"
        path: "/zap/wrk"
    waitFor: ["deploy-api-staging"]

substitutions:
  _REGION: southamerica-east1
  _REPO: gabi
  _TAG: latest # override with --substitutions=_TAG=$SHORT_SHA on trigger
  _STAGING_API_URL: https://gabi-api-fbbwlzhdlq-rj.a.run.app
  _FIREBASE_AUTH_DOMAIN: "nghost-gabi.firebaseapp.com"
  _FIREBASE_PROJECT_ID: "nghost-gabi"

availableSecrets:
  secretManager:
    - versionName: projects/nghost-gabi/secrets/firebase-api-key/versions/latest
      env: FIREBASE_API_KEY

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
