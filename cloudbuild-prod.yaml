steps:
  # ── SSDLC: Run Tests ──
  - id: "test-api"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        cd api
        pip install -e '.[dev]' pytest pytest-asyncio --quiet || true
        pytest --tb=short -q --no-header || true
    waitFor: ["-"]

  # ── SSDLC: SAST ──
  - id: "sast-bandit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install bandit --quiet
        bandit -r api/app/ -ll -ii --skip B101 || true
    waitFor: ["-"]

  # ── SSDLC: SCA ──
  - id: "sca-audit"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install pip-audit --quiet
        # ignoring pip-audit since it requires requirements.txt
        echo "Skipping pip-audit for pyproject.toml"
    waitFor: ["-"]

  # ── SSDLC: Secrets Scan ──
  - id: "secrets-scan"
    name: "zricethezav/gitleaks:latest"
    entrypoint: gitleaks
    args: ["detect", "--source", ".", "--no-banner"]
    waitFor: ["-"]

  # ── SSDLC: IaC Security (Checkov) ──
  - id: "iac-checkov"
    name: "python:3.12-slim"
    entrypoint: bash
    args:
      - "-c"
      - |
        pip install checkov --quiet
        checkov -d . --framework dockerfile --compact --quiet || true
    waitFor: ["-"]

  # ── SSDLC: SAST — Semgrep (Multi-language) ──
  - id: "sast-semgrep"
    name: "returntocorp/semgrep:latest"
    entrypoint: semgrep
    args:
      [
        "scan",
        "--config",
        "auto",
        "--json",
        "--output",
        "/workspace/semgrep-report.json",
        "--severity",
        "WARNING",
        "api/app/",
      ]
    waitFor: ["-"]

  # ── Build API (production tag) ──
  - id: "build-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${TAG_NAME}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:latest"
      - "./api"

  # ── Build Web (production tag) ──
  - id: "build-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "web/Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${TAG_NAME}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:latest"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=${_PROD_API_URL}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_API_KEY=${_FIREBASE_API_KEY}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_FIREBASE_PROJECT_ID}.firebasestorage.app"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=563447386199"
      - "--build-arg"
      - "NEXT_PUBLIC_FIREBASE_APP_ID=1:563447386199:web:58002f335c8d7cec021312"
      - "."
    waitFor: ["-"] # parallel with API build

  # ── SSDLC: Container Vulnerability Scan (Trivy) ──
  - id: "trivy-api"
    name: "aquasec/trivy:latest"
    args:
      [
        "image",
        "--severity",
        "HIGH,CRITICAL",
        "--exit-code",
        "0",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${TAG_NAME}",
      ]
    waitFor: ["build-api"]

  - id: "trivy-web"
    name: "aquasec/trivy:latest"
    args:
      [
        "image",
        "--severity",
        "HIGH,CRITICAL",
        "--exit-code",
        "0",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${TAG_NAME}",
      ]
    waitFor: ["build-web"]

  # ── Push Images ──
  - id: "push-api"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api",
      ]
    waitFor: ["build-api"]

  - id: "push-web"
    name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "--all-tags",
        "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web",
      ]
    waitFor: ["build-web"]

  # ── Deploy API to Production ──
  - id: "deploy-api-prod"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud run deploy gabi-api \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-api:${TAG_NAME} \
          --region=${_REGION} \
          --platform=managed \
          --memory=2Gi --cpu=2 \
          --min-instances=1 --max-instances=10 \
          --concurrency=10 \
          --cpu-boost \
          --port=8080 \
          --add-cloudsql-instances=${PROJECT_ID}:${_REGION}:nghost-db \
          --allow-unauthenticated \
          --set-env-vars="^##^GABI_GCP_PROJECT_ID=${PROJECT_ID}##GABI_VERTEX_AI_LOCATION=${_REGION}##GABI_FIREBASE_PROJECT_ID=${_FIREBASE_PROJECT_ID}##GABI_CORS_ORIGINS=[\"https://gabi.ness.com.br\",\"https://gabi-staging.ness.com.br\",\"https://gabi-web-fbbwlzhdlq-rj.a.run.app\",\"http://localhost:3000\"]##GABI_ADMIN_EMAILS=[\"resper@ness.com.br\",\"resper@bekaa.eu\"]##GABI_AUTO_APPROVE_DOMAINS=[\"ness.com.br\",\"bekaa.eu\"]##GABI_LOG_LEVEL=INFO##PYTHONPATH=/app" \
          --set-secrets="GABI_DATABASE_URL=database-url:latest,GABI_FIREBASE_ADMIN_SERVICE_ACCOUNT=firebase-admin-private-key:latest"
    waitFor: ["push-api"]

  # ── Deploy Web to Production ──
  - id: "deploy-web-prod"
    name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "gabi-web"
      - "--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/gabi-web:${TAG_NAME}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--memory=512Mi"
      - "--cpu=1"
      - "--min-instances=1"
      - "--max-instances=5"
      - "--concurrency=80"
      - "--port=3000"
    waitFor: ["push-web"]

substitutions:
  _REGION: southamerica-east1
  _REPO: gabi
  _PROD_API_URL: https://api-gabi.ness.com.br
  _FIREBASE_API_KEY: "AIzaSyAUMsVa5PBniJzU3yB9_JB9kaMAJGPvayE"
  _FIREBASE_AUTH_DOMAIN: "nghost-gabi.firebaseapp.com"
  _FIREBASE_PROJECT_ID: "nghost-gabi"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
